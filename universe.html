<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyMindNova Universe</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
color:white;
}

/* galaxy canvas */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* center container */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
width:80%;
max-width:700px;
}

/* focus circle */

.circle{
width:220px;
height:220px;
border-radius:50%;
border:2px solid rgba(0,200,255,0.7);
margin:auto;
box-shadow:
0 0 20px rgba(0,200,255,0.8),
0 0 60px rgba(0,200,255,0.4);
animation:pulse 4s infinite;
}

/* affirmation */

.text{
margin-top:30px;
font-size:26px;
font-weight:300;
letter-spacing:1px;
opacity:0;
transition:opacity 2s;
}

/* orbit images */

.orbit-img{
position:absolute;
width:90px;
height:90px;
border-radius:12px;
object-fit:cover;
border:2px solid #00d4ff;
box-shadow:0 0 12px rgba(0,200,255,0.7);
}

/* pulse animation */

@keyframes pulse{

0%{ transform:scale(1); }
50%{ transform:scale(1.05); }
100%{ transform:scale(1); }

}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<div class="center">

<div class="circle"></div>

<div id="affirmation" class="text"></div>

</div>

<script src="universe.js"></script>

</body>
</html>
