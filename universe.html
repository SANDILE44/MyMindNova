<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyMindNova Universe</title>

<style>

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BODY */

body{
background:black;
font-family:Arial, sans-serif;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;
}

/* GALAXY BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* MAIN CENTER AREA */

.center{
position:relative;
z-index:2;
text-align:center;
padding:20px;
width:90%;
max-width:500px;
}

/* FOCUS CIRCLE */

.circle{
width:200px;
height:200px;
border-radius:50%;
margin:auto;

border:2px solid rgba(0,200,255,0.7);

box-shadow:
0 0 20px rgba(0,200,255,0.8),
0 0 60px rgba(0,200,255,0.4);

animation:pulse 4s infinite;
}

/* AFFIRMATION TEXT */

.text{
margin-top:25px;
font-size:22px;
font-weight:300;
letter-spacing:1px;
line-height:1.4;
opacity:0;
transition:opacity 2s;
}

/* ORBITING IMAGES */

.orbit-img{
position:absolute;
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;

border:2px solid #00d4ff;

box-shadow:0 0 10px rgba(0,200,255,0.7);
}

/* PULSE ANIMATION */

@keyframes pulse{

0%{ transform:scale(1); }

50%{ transform:scale(1.06); }

100%{ transform:scale(1); }

}

/* LARGER SCREENS */

@media (min-width:768px){

.circle{
width:230px;
height:230px;
}

.text{
font-size:26px;
}

.orbit-img{
width:90px;
height:90px;
}

}

</style>

</head>

<body>

<canvas id="galaxy"></canvas>

<div class="center">

<div class="circle"></div>

<div id="affirmation" class="text"></div>

</div>

<script src="universe.js"></script>
<script src="music.js"></script>


</body>

</html>
