<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyMindNova Universe</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
color:white;
}

/* galaxy canvas */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* center container */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
width:80%;
max-width:700px;
}

/* focus circle */

.circle{
width:220px;
height:220px;
border-radius:50%;
border:2px solid rgba(0,200,255,0.7);
margin:auto;
box-shadow:
0 0 20px rgba(0,200,255,0.8),
0 0 60px rgba(0,200,255,0.4);
animation:pulse 4s infinite;
}

/* affirmations */

.text{
margin-top:30px;
font-size:26px;
font-weight:300;
letter-spacing:1px;
opacity:0;
transition:opacity 2s;
}

/* pulse effect */

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<div class="center">

<div class="circle"></div>

<div id="affirmation" class="text"></div>

</div>

<script>

/* galaxy animation */

const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<400;i++){

particles.push({
angle:Math.random()*Math.PI*2,
radius:Math.random()*500,
speed:0.001 + Math.random()*0.003
});

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.angle += p.speed;

let x = canvas.width/2 + Math.cos(p.angle)*p.radius;
let y = canvas.height/2 + Math.sin(p.angle)*p.radius;

ctx.fillStyle="white";
ctx.fillRect(x,y,2,2);

});

requestAnimationFrame(animate);

}

animate();

/* get text from page 1 */

const goal = localStorage.getItem("goalText") || "";

/* simple affirmation generator */

let affirmations = [];

if(goal.includes("business") || goal.includes("saas")){

affirmations.push(
"My business grows stronger every day.",
"I build systems that attract valuable clients.",
"My work creates real impact."
);

}

if(goal.includes("money") || goal.includes("income")){

affirmations.push(
"My income expands steadily.",
"I create financial freedom.",
"I attract profitable opportunities."
);

}

if(goal.includes("success") || goal.includes("future")){

affirmations.push(
"My future is powerful.",
"I move confidently toward my goals.",
"My vision becomes reality."
);

}

/* fallback */

if(affirmations.length === 0){

affirmations = [
"My focus creates success.",
"My discipline builds my future.",
"I move forward every day."
];

}

/* rotate affirmations */

let index = 0;
const textElement = document.getElementById("affirmation");

function showAffirmation(){

textElement.style.opacity = 0;

setTimeout(()=>{

textElement.textContent = affirmations[index];

textElement.style.opacity = 1;

index++;

if(index >= affirmations.length){
index = 0;
}

},1000);

}

showAffirmation();

setInterval(showAffirmation,6000);

</script>

</body>
  </html>
