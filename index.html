<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>MyMindNova</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- STAR BACKGROUND -->
<canvas id="stars"></canvas>

<!-- MAIN UI -->
<div class="container">

<h1>MyMindNova</h1>

<p>Describe the future you want:</p>

<textarea 
id="goalText"
placeholder="Example: I build a successful SaaS business, attract many clients, achieve financial freedom, and become a powerful leader.">
</textarea>

<div class="upload">

<p>Upload images of your goals:</p>

<input 
type="file" 
id="imageUpload" 
multiple 
accept="image/*">

</div>

<!-- IMAGE PREVIEW -->
<div class="preview" id="preview"></div>

<button id="generateBtn">
Generate My Universe
</button>

</div>

<!-- SCRIPTS -->

<script src="app.js" defer></script>
</body>

</html>
