<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyMindNova</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<h1>MyMindNova</h1>

<p>Describe the future you want:</p>

<textarea id="goalText"
placeholder="Example: I build a successful SaaS business, attract many clients, and achieve financial freedom..."></textarea>

<div class="upload">

<p>Upload images of your goals:</p>

<input type="file" id="imageUpload" multiple accept="image/*">

</div>

<div class="preview" id="preview"></div>

<button id="generateBtn">Generate My Universe</button>

</div>

<script src="app.js"></script>
<script src="music.js"></script>

</body>
</html>
